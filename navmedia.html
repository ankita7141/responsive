<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>


    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        nav{
            display: flex;
            justify-content: space-between;
            align-items:center;
            background: #581c1c;
            font-family: Arial, Helvetica, sans-serif;
            padding: 9px 30px;
            color: aliceblue    ;
            
            

        }
        .nav1{
            display: flex;
            justify-content: space-between;
            align-items:center;
            gap: 20px;
        }
          .nav2{
            display: flex;
            justify-content: space-around;
            align-items:center;
            
            padding: 20px ;
            gap: 50px;
            
            

        }
        .nav2 a{
            text-decoration: none;
            color:white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            

        }
    .nav1 img{
        height: 50px;
        width: 40px;
    }
    .nav1 h1{
        width: 20px;
        font-size: 30px;
        color: rgb(60, 138, 169);
    }
    .nav2 h5{
        display: none;
        font-size: 20px;
        color: black;
    }
    @media (max-width:800px) {
        nav{
            background-color: darkcyan;
        }
        .nav2 a{
            display: none;
        }
        .nav2 h5 {
            display: block;
                
        }
        .nav1 h1{
            color: black;
            font-size: 20px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
    }
    @media (max-width:250px) {
        nav{
            background-color: rgb(14, 101, 126);
        }

    .nav1 img{
        display: none;  
    }
    .nav1 h1{
        font-size: 15px;
        font-family: sans-serif;
    }
        
    }

    </style>
</head>
<body>
    <nav>
        <div class="nav1">
            <img src="/b3.webp" alt="">
            <h1>smart Ecoloop</h1>
        </div>
        <div class="nav2">
            <a href="#">home</a>
            <a href="#">product</a>
            <a href="#">about</a>
            <a href="#">discount</a>
            <a href="#">contact us</a>
            <h5><i class="ri-menu-line"></i></h5>
        </div>
    </nav>
    
</body>
</html>
